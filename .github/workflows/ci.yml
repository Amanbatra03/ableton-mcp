name: CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip and build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install package
        run: pip install .

      - name: Install dev dependencies
        run: pip install pytest pytest-asyncio ruff pyright

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run pyright type checking
        run: pyright src/ || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip and build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install package
        run: pip install .

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Run tests (skip live tests and OSC bridge tests)
        run: pytest tests/ -v -m "not live" --ignore=tests/test_osc_bridge.py --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .pytest_cache/

  integration-test:
    name: Integration Test (Windows with Ableton)
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Upgrade pip and build tools
        run: pip install --upgrade pip setuptools wheel

      - name: Install package
        run: pip install .

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio

      - name: Run integration tests
        run: pytest tests/ -v -m "live" --ignore=tests/test_osc_bridge.py --tb=short
        continue-on-error: true

      - name: Upload integration results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-results
          path: .pytest_cache/
